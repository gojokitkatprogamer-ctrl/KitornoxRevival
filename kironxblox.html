<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KironxBlox Roblox Revival</title>
    <link rel="stylesheet" href="AllCSS.css">
</head>
<body>
    <header>
        <h1>KironxBlox Roblox Revival</h1>
    </header>
    <section id="login">
        <h2>Login</h2>
        <form action="#" method="post">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
    </section>
    <section id="games-catalog">
        <h2>Games Catalog</h2>
        <p>Explore our wide range of games!</p>
        <!-- Games will be listed here -->
    </section>
    <section id="user-profiles">
        <h2>User Profiles</h2>
        <p>Check out user profiles.</p>
        <!-- User profiles will be listed here -->
    </section>
    <section id="forums">
        <h2>Forums</h2>
        <p>Join the community discussions.</p>
        <!-- Forum links will be listed here -->
    </section>
    <section id="community-links">
        <h2>Community Links</h2>
        <ul>
            <li><a href="#">Community Page</a></li>
            <li><a href="#">Support</a></li>
            <li><a href="#">Events</a></li>
        </ul>
    </section>
    <footer>
        <p>&copy; 2026 KironxBlox Community</p>
    </footer>
</body>
</html>
